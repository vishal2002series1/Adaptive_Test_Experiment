AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Adaptive UPSC Test Generation API using LangGraph and Gemini

Resources:
  # 1. DynamoDB Table for Long-Term Student Memory
  StudentProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveStudentProfiles  
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: target_exam      
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: target_exam      
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # 👉 NEW: DynamoDB Table for Historical Test Logs
  TestHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveTestHistoryLogs  
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: timestamp      
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: timestamp      
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # 2. OpenSearch Serverless (Vector DB for Option A)
  OptionAVectorDB:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn: [VectorEncryptionPolicy, VectorNetworkPolicy]
    Properties:
      Name: "option-a-vector-db"
      Type: "VECTORSEARCH"
      Description: "Vector DB for Option A generated questions"

  VectorEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: "option-a-enc-policy"
      Type: "encryption"
      Policy: '{"Rules":[{"ResourceType":"collection","Resource":["collection/option-a-vector-db"]}],"AWSOwnedKey":true}'

  VectorNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: "option-a-net-policy"
      Type: "network"
      Policy: '[{"Rules":[{"ResourceType":"collection","Resource":["collection/option-a-vector-db"]}],"AllowFromPublic":true}]'

  # 3. The LangGraph Multi-Agent Lambda Function
  TestGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:       
        - arm64
      MemorySize: 2048       
      Timeout: 900           
      Environment:
        Variables:
          STUDENT_TABLE: !Ref StudentProfileTable
          HISTORY_TABLE: !Ref TestHistoryTable # 👉 NEW: Inject the history table name
          OPENSEARCH_ENDPOINT: !GetAtt OptionAVectorDB.CollectionEndpoint
          GEMINI_API_KEY: "placeholder-key"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudentProfileTable
        # 👉 NEW: Grant permission to the new history table
        - DynamoDBCrudPolicy:
            TableName: !Ref TestHistoryTable
        # Grant Lambda permission to access the OpenSearch APIs
        - Statement:
            - Effect: Allow
              Action:
                - aoss:APIAccessAll
              Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: python3.11-v1

  # Data Access Policy to allow Lambda and your local machine to read/write data
  VectorDataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: "option-a-access-policy"
      Type: "data"
      Policy: !Sub >
        [
          {
            "Rules": [
              {
                "ResourceType": "index",
                "Resource": ["index/*/*"],
                "Permission": ["aoss:*"]
              },
              {
                "ResourceType": "collection",
                "Resource": ["collection/option-a-vector-db"],
                "Permission": ["aoss:*"]
              }
            ],
            "Principal": [
              "${TestGeneratorFunctionRole.Arn}",
              "arn:aws:iam::258574424891:user/vishal-ey"
            ]
          }
        ]

Outputs:
  GenerateTestFunctionUrl:
    Description: "Direct Lambda Function URL for POST requests (15-min timeout)"
    Value: !GetAtt TestGeneratorFunctionUrl.FunctionUrl
  OpenSearchEndpoint:
    Description: "Endpoint URL for the OpenSearch Vector DB"
    Value: !GetAtt OptionAVectorDB.CollectionEndpoint