AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Adaptive UPSC Test Generation API using LangGraph and Gemini

Resources:
  # 1. DynamoDB Table for Long-Term Student Memory
  StudentProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveStudentProfiles  
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: target_exam      
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: target_exam      
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # 2. DynamoDB Table for Historical Test Logs
  TestHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveTestHistoryLogs  
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: timestamp      
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: timestamp      
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # 3. DynamoDB Table for Caching Dynamic Workbooks
  WorkbookCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveWorkbooks  
      AttributeDefinitions:
        - AttributeName: target_exam
          AttributeType: S
        - AttributeName: topic_key      
          AttributeType: S
      KeySchema:
        - AttributeName: target_exam
          KeyType: HASH
        - AttributeName: topic_key      
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      # 👉 THE FIX: Added TTL Specification for Content Retirement
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # 4. DynamoDB Table for Pending Tests & Session Resume
  PendingTestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptivePendingTests
      AttributeDefinitions:
        - AttributeName: student_id
          AttributeType: S
        - AttributeName: target_exam
          AttributeType: S
      KeySchema:
        - AttributeName: student_id
          KeyType: HASH
        - AttributeName: target_exam
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # 5. DynamoDB Table for Master Question Bank
  QuestionBankTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdaptiveQuestionBank
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # 6. S3 Bucket for Question Diagrams/Images
  QuestionImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "adaptive-test-images-${AWS::AccountId}-${AWS::Region}"
      # Security: Block public access. We will use secure Pre-signed URLs for the UI.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']
            MaxAge: 3600

  # 7. OpenSearch Serverless (Vector DB for Option A)


  # 8. The LangGraph Multi-Agent Lambda Function
  # 8. The LangGraph Multi-Agent Lambda Function
  TestGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:       
        - arm64
      MemorySize: 2048       
      Timeout: 900           
      Environment:
        Variables:
          STUDENT_TABLE: !Ref StudentProfileTable
          HISTORY_TABLE: !Ref TestHistoryTable 
          WORKBOOK_TABLE: !Ref WorkbookCacheTable
          PENDING_TESTS_TABLE: !Ref PendingTestsTable 
          QUESTION_BANK_TABLE: !Ref QuestionBankTable
          IMAGES_BUCKET: !Ref QuestionImagesBucket
          UPSTASH_VECTOR_REST_URL: "https://key-panther-69228-us1-vector.upstash.io"
          UPSTASH_VECTOR_REST_TOKEN: "ABUFMGtleS1wYW50aGVyLTY5MjI4LXVzMWFkbWluWkdVM1pEWm1OVEF0TXpsall5MDBOemMzTFdFMVkyTXRaV00wTnpSbU56VTFNamd4"
          # 👉 NEW: Bedrock Cross-Account Configs
          BEDROCK_TARGET_ROLE_ARN: "arn:aws:iam::258574424891:role/CrossAccountAdminRole"
          BEDROCK_EXTERNAL_ID: "92F110A6-4E94-4359-82F3-C718DD537623"
          TAVILY_API_KEY: "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"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudentProfileTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TestHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkbookCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PendingTestsTable
        - DynamoDBCrudPolicy:                              
            TableName: !Ref QuestionBankTable              
        - S3CrudPolicy:                                    
            BucketName: !Ref QuestionImagesBucket
        # 👉 NEW: Permission to assume Account 1 Role
        - Statement:
            - Effect: Allow
              Action:
                - sts:AssumeRole
              Resource: "arn:aws:iam::258574424891:role/CrossAccountAdminRole"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: python3.11-v1
  

Outputs:
  GenerateTestFunctionUrl:
    Description: "Direct Lambda Function URL for POST requests (15-min timeout)"
    Value: !GetAtt TestGeneratorFunctionUrl.FunctionUrl
